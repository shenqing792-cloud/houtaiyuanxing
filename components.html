<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>组件沉淀</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --primary: #1677ff;
      --sidebar: #071f3f;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: #1f2d3d;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      font-size: 13px;
    }

    .app {
      display: grid;
      grid-template-columns: 194px 1fr;
      grid-template-rows: 52px 1fr;
      min-height: 100vh;
    }

    .topbar {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: 194px 1fr auto;
      height: 52px;
      background: #082c55;
      color: #fff;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 18px;
      font-size: 18px;
      font-weight: 700;
      background: #0a3768;
    }

    .brand-mark {
      width: 26px;
      height: 26px;
      border-radius: 6px;
      background: linear-gradient(135deg, #ffbe45, #ff6f35);
    }

    .top-title {
      display: flex;
      align-items: center;
      padding-left: 24px;
      font-size: 14px;
    }

    .userbox {
      display: flex;
      align-items: center;
      gap: 8px;
      padding-right: 18px;
      font-size: 12px;
    }

    .avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #ff7a45;
      display: grid;
      place-items: center;
      color: #fff;
    }

    .sidebar {
      grid-row: 2;
      background: var(--sidebar);
      color: #d9e6f7;
      padding-top: 18px;
    }

    .menu-item {
      width: 100%;
      height: 50px;
      border: 0;
      background: transparent;
      color: inherit;
      display: flex;
      align-items: center;
      padding: 0 20px;
      font: inherit;
      cursor: pointer;
      text-align: left;
    }

    .menu-item.active {
      background: var(--primary);
      color: #fff;
    }

    .content {
      grid-row: 2;
      padding: 16px;
      overflow: hidden;
    }

    .breadcrumb {
      height: 34px;
      display: flex;
      align-items: center;
      color: #607086;
      margin-bottom: 10px;
    }

    .frame {
      width: 100%;
      height: calc(100vh - 112px);
      border: 0;
      display: block;
      background: #fff;
      border-radius: 8px;
    }

    @media (max-width: 860px) {
      .app { grid-template-columns: 1fr; grid-template-rows: 52px auto 1fr; }
      .topbar { grid-template-columns: 1fr auto; }
      .brand { display: none; }
      .sidebar { grid-row: 2; display: flex; padding: 0; }
      .menu-item { justify-content: center; }
      .content { grid-row: 3; padding: 12px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark"></div>
        <span>发行运营后台</span>
      </div>
      <div class="top-title">组件沉淀</div>
      <div class="userbox">
        <div class="avatar">申</div>
        <span>申庆</span>
      </div>
    </header>

    <aside class="sidebar">
      <button class="menu-item active" type="button" data-page="filters.html?embed=1" data-title="筛选项组件">筛选项组件</button>
      <button class="menu-item" type="button" data-page="list-components.html?embed=1" data-title="列表内容组件">列表内容组件</button>
      <button class="menu-item" type="button" data-page="modal-components.html?embed=1" data-title="添加编辑窗口">添加编辑窗口</button>
    </aside>

    <main class="content">
      <div class="breadcrumb" id="breadcrumb">首页 / 原型组件 / 筛选项组件</div>
      <iframe class="frame" id="componentFrame" src="filters.html?embed=1" title="组件内容"></iframe>
    </main>
  </div>

  <script>
    const frame = document.getElementById("componentFrame");
    const breadcrumb = document.getElementById("breadcrumb");
    const menuItems = Array.from(document.querySelectorAll(".menu-item"));

    menuItems.forEach((item) => {
      item.addEventListener("click", () => {
        menuItems.forEach((menu) => menu.classList.remove("active"));
        item.classList.add("active");
        frame.src = item.dataset.page;
        breadcrumb.textContent = `首页 / 原型组件 / ${item.dataset.title}`;
      });
    });
  </script>
</body>
</html>
